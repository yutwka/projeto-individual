<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="containerCadastro">
        <div class="esquerdoLogin">
            <div class="logoLogin">
                <a href="index.html"><img src="assets/imgs/investz-logo.svg" alt="">investZ</a>
            </div>
            <div class="perfil">
                <div class="subtituloCadastro">
                    <div></div>
                    <p>BEM VINDO DE VOLTA</p>
                </div>
                <div class="textoCadastro">
                    <div class="grandeCadastro">Seu perfil te <br>
                        <span id="inteli"><i>espera.</i></span> <br>
                    </div>
                    <p>Acesse sua dashboard personalizada e acompanhe as projeções do seu patrimônio com base no seu
                        perfil de investidor.</p>
                </div>
            </div>
        </div>

        <div class="direitoLogin">
            <div class="formulario">
                <div class="criar">
                    Entrar na conta
                </div>
                <hr>
                <div class="camposForm">
                    <div class="nomeCampo">
                        E-MAIL
                    </div>
                    <input type="text" id="ipt_email" placeholder="seuemail@exemplo.com">
                </div>
                <div class="camposForm">
                    <div class="nomeCampo">
                        SENHA
                    </div>
                    <input type="password" id="ipt_senha" placeholder="........">
                </div>
                <div class="espaco"><button onclick="entrar()">Entrar</button></div>
                <div class="fazerLogin">
                    <p>Ainda não tem conta? <span class="ns"><a href="cadastro.html">Criar conta grátis</span></a></p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
<script>
    function entrar(){
        let email = ipt_email.value;
        let senha = ipt_senha.value;

        if (email == ''){
            alert ('Email vazio')
        } 

        if (senha == ''){
            alert('Senha vazia')
        }

         fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: email,
                senhaServer: senha,
            }),
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ID_USUARIO = json.id;
                    // sessionStorage.AQUARIOS = JSON.stringify(json.aquarios)
                    console.log('oi')
                    setTimeout(function () {
                        window.location = "./dashboard/cards.html";
                    }, 1000); // apenas para exibir o loading

                });

            } else {

                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                    finalizarAguardar(texto);
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }
</script>
