<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro investZ</title>
    <link rel="stylesheet" href="styles/style.css">
</head>

<body>

    <div class="containerCadastro">
        <div class="esquerdoLogin">
            <div class="logoLogin">
                <img src="assets/imgs/investz-logo.svg" alt=""><a href="index.html">investZ</a>
            </div>
            <div class="perfil">
                <div class="subtituloCadastro">
                    <div></div>
                    <p>BEM VINDO DE VOLTA</p>
                </div>
                <div class="textoCadastro">
                    <div class="grandeCadastro">Seu perfil te <br>
                        <span id="inteli"><i>espera.</i></span> <br>
                    </div>
                    <p>Acesse sua dashboard personalizada e acompanhe as projeções do seu patrimônio com base no seu
                        perfil de investidor.</p>
                </div>
            </div>
        </div>

        <div class="direitoLogin">
            <div class="formulario">
                <div class="criar">
                    Entrar na conta
                </div>
                <hr>
                <div class="camposForm">
                    <div class="nomeCampo">
                        E-MAIL
                    </div>
                    <input type="text" id="ipt_email" placeholder="seuemail@exemplo.com">
                </div>
                <div class="camposForm">
                    <div class="nomeCampo">
                        SENHA
                    </div>
                    <input type="password" id="ipt_senha" placeholder="........">
                </div>
                <div class="fazerLogin">
                    <p>Ainda não tem conta? <span class="ns"><a href="cadastro.html">Criar conta grátis</span></a></p>
                </div>
            </div>
        </div>
    </div>






</body>

</html>
