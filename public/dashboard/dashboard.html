<script>
    patrimonio();
    obterDadosGrafico();
    obterDadosGrafico2();

    b_usuario.innerHTML = sessionStorage.NOME_USUARIO;
    b_usuario2.innerHTML = sessionStorage.NOME_USUARIO;

    let proximaAtualizacao;

    function obterDadosGrafico() {

        let idUsuario = sessionStorage.ID_USUARIO;

        fetch(`/aportes/patrimonio/${idUsuario}`, { cache: 'no-store' }).then(function (response) {
            if (response.ok) {
                response.json().then(function (resposta) {
                    console.log(`Dados recebidos: ${JSON.stringify(resposta)}`);
                    resposta.reverse();

                    plotarGrafico(resposta, idUsuario);

                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
            }
        })
            .catch(function (error) {
                console.error(`Erro na obtenção dos dados p/ gráfico: ${error.message}`);
            });
    }

    // Esta função *plotarGrafico* usa os dados capturados na função anterior para criar o gráfico
    // Configura o gráfico (cores, tipo, etc), materializa-o na página e, 
    // A função *plotarGrafico* também invoca a função *atualizarGrafico*
    function plotarGrafico(resposta, idUsuario) {

        console.log('iniciando plotagem do gráfico...');

        // Criando estrutura para plotar gráfico - labels
        // let labels = [];

        // Criando estrutura para plotar gráfico - dados
        let dados = {
            labels: ['Rendimento dos Juros', 'Total Investido'],
            datasets: [{
                label: 'Patrimônio Total',
                data: [resposta[0].totalJuros, resposta[0].totalInvestido],
                backgroundColor: ['#e8e8e8', '#3a3a3a'],
                borderColor: ['#FFF'],
                borderWidth: 1
            }]
        };

        console.log('----------------------------------------------')
        console.log('Estes dados foram recebidos pela funcao "obterDadosGrafico" e passados para "plotarGrafico":')
        console.log(resposta)

        // Inserindo valores recebidos em estrutura para plotar o gráfico
        // for (i = 0; i < resposta.length; i++) {
        //     var registro = resposta[i];
        //     labels.push(registro.totalInvestido);
        //     dados.datasets[0].data.push(registro.totalInvestido);
        // }

        console.log('----------------------------------------------')
        console.log('O gráfico será plotado com os respectivos valores:')
        // console.log('Labels:')
        // console.log(labels)
        console.log('Dados:')
        console.log(dados.datasets)
        console.log('----------------------------------------------')

        // Criando estrutura para plotar gráfico - config
        const config = {
            type: 'doughnut',
            data: dados,
        };

        // Adicionando gráfico criado em div na tela
        let myChart = new Chart(
            document.getElementById(`graficoComposicao`),
            config
        );
    }

    function obterDadosGrafico2() {

        let idUsuario = sessionStorage.ID_USUARIO;

        fetch(`/aportes/patrimonio/${idUsuario}`, { cache: 'no-store' }).then(function (response) {

    // Configura o gráfico (cores, tipo, etc), materializa-o na página e, 
    // A função *plotarGrafico* também invoca a função *atualizarGrafico*
    function plotarGrafico2(resposta, idUsuario) {
        console.log('iniciando plotagem do gráfico...');

        // Criando estrutura para plotar gráfico - labels
        // let labels = [];

        // Criando estrutura para plotar gráfico - dados
        let dados = {
            labels: ['Apenas Guardando', 'Investindo'],
            datasets: [{
                label: 'Patrimônio Total',
                data: [resposta[0].totalInvestido, resposta[0].montanteFinal],
                backgroundColor: ['#e8e8e8', '#3a3a3a']
            }]
        };

        console.log('----------------------------------------------')
        console.log('Estes dados foram recebidos pela funcao "obterDadosGrafico2" e passados para "plotarGrafico2":')
        console.log(resposta)

        // Inserindo valores recebidos em estrutura para plotar o gráfico
        // for (i = 0; i < resposta.length; i++) {
        //     var registro = resposta[i];
        //     labels.push(registro.totalInvestido);
        //     dados.datasets[0].data.push(registro.totalInvestido);
        // }

        console.log('----------------------------------------------')
        console.log('O gráfico será plotado com os respectivos valores:')
        // console.log('Labels:')
        // console.log(labels)
        console.log('Dados:')
        console.log(dados.datasets)
        console.log('----------------------------------------------')

        // Criando estrutura para plotar gráfico - config
        const config = {
            type: 'bar',
            data: dados,
            options: {
                plugins: {
                    legend: {
                        display: false
                    }
                }
            }
        };

        // Adicionando gráfico criado em div na tela
        let myChart = new Chart(

        );
    }

    function patrimonio() {

        let idUsuario = sessionStorage.ID_USUARIO;

        fetch(`/aportes/patrimonio/${idUsuario}`, { cache: 'no-store' }).then(function (response) {
            if (response.ok) {
                response.json().then(function (resposta) {
                    console.log(`Dados recebidos: ${JSON.stringify(resposta)}`);
                    console.log(resposta);

                    rentabilidade.innerHTML = (resposta[resposta.length - 1].rentabilidade) * 100 + "% AO ANO";
                    mensal.innerHTML = "R$ " + Number(resposta[resposta.length - 1].aporteMensal).toLocaleString('pt-BR');
                    inicial.innerHTML = "R$ " + Number(resposta[resposta.length - 1].aporteInicial).toLocaleString('pt-BR');
                    tempo.innerHTML = resposta[resposta.length - 1].tempoAnos + " ANOS";
                    kpiPatrimonio.innerHTML = resposta[resposta.length - 1].montanteFinal.toLocaleString('pt-BR');
                    kpiJuros.innerHTML = resposta[resposta.length - 1].totalJuros.toLocaleString('pt-BR');
                    kpiInvestido.innerHTML = Number(resposta[resposta.length - 1].totalInvestido).toLocaleString('pt-BR');
                    tipoPerfil.innerHTML = "• Perfil " + resposta[resposta.length - 1].tipo;

                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
            }
        })
            .catch(function (error) {
                console.error(`Erro na obtenção dos dados p/ gráfico: ${error.message}`);
            });
    }

</script>
