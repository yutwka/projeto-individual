                    <a href="questionario.html"><img src="../assets/imgs/clipboard-list.svg" alt="">Questionário</a>

                <div class="paginas">
                    <img src="../assets/imgs/house-white.svg" alt="">Aporte

        <div class="formularioAporte">
            <div id="aporte">
                <div class="camposAporte">
                    <label for="ipt_aporteInicial">Insira o valor do aporte inicial:</label>
                    <input type="text" id="ipt_aporteInicial" />
                    
                </div>
                <div class="camposAporte">
                    <label for="ipt_aporteMensal">Insira o valor do aporte mensal:</label>
                    <input type="text" id="ipt_aporteMensal" />
                </div>
                <div class="camposAporte">
                    <label for="ipt_tempoAporte">Insira o tempo (em anos) dos aportes:</label>
                    <input type="text" id="ipt_tempoAporte" />
                </div>
            </div>
            <button onclick="inserir()">Inserir o aporte</button>
        </div>
    </div>

</body>
<script>
    function inserir(){
        let aporteInicial = ipt_aporteInicial.value;
        let aporteMensal = ipt_aporteMensal.value;
        let tempoAporte = ipt_tempoAporte.value;
        let fkUsuario = sessionStorage.ID_USUARIO;

        fetch("/aportes/cadastrar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
            },
            body: JSON.stringify({
                // crie um atributo que recebe o valor recuperado aqui
                // Agora vá para o arquivo routes/usuario.js
                aporteInicialServer: aporteInicial,
                aporteMensalServer: aporteMensal,
                tempoAnosServer: tempoAporte,
                fkUsuarioServer: fkUsuario,
            }),
        })
            .then(function (resposta) {
                console.log("resposta: ", resposta);

                if (resposta.ok) {
                    // cardErro.style.display = "block";

                    // mensagem_erro.innerHTML =
                        // "Cadastro realizado com sucesso! Redirecionando para tela de Dashboard...";
                    setTimeout(() => {
                        window.location = "dashboard.html";
                    }, "2000");
                    // limparFormulario();
                    // finalizarAguardar();
                } else {
                    throw "Houve um erro ao tentar realizar o cadastro!";
                }
            })
            .catch(function (resposta) {
                console.log(`#ERRO: ${resposta}`);
                // finalizarAguardar();
            });

        return false;

    }
</script>
